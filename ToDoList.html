<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <style>
        body { font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            text-align: center;}

        h2 {margin-top: 20px;} .input-container {margin-bottom: 20px;}

        input[type="text"] {padding: 10px; width: 60%; font-size: 16px; }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: black; }

        button { padding: 10px 15px; font-size: 16px; background-color: black; color: white;
            border: none; cursor: pointer;}

        button:hover { background-color: #45a049;}

        ul {list-style-type: none; margin: 20px auto; padding: 0; width: 60%;
            text-align: left;}

        li {padding: 10px; background: #eee; margin-bottom: 5px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;}

        li:hover {background: #ddd;} .checked-text {text-decoration: line-through;color: gray;}
        .todo-content { flex-grow: 1; margin-left: 10px;}
        .close { color: black; cursor: pointer; font-weight: bold; margin-left: 10px;
            font-size: 20px;}
    </style>
</head>
<body>

<h2>Мой список дел</h2>

<div class="input-container">
    <input type="text" id="myInput" placeholder="Введите задачу..." onkeydown="if(event.key === 'Enter') newElement()">
    <button onclick="newElement()">Добавить</button>
</div>

<ul id="myUL"></ul>

<script>
function newElement() {
    let input = document.getElementById("myInput");
    let inputValue = input.value.trim();

    if (inputValue === "") {
        alert("Введите задачу!");
        return;
    }

    let li = document.createElement("li");

    let checkBox = document.createElement("input");
    checkBox.type = "checkbox";
    
    let textSpan = document.createElement("span");
    textSpan.textContent = inputValue;
    textSpan.className = "todo-content";

    checkBox.onchange = function() {
        if (this.checked) {
            textSpan.classList.add("checked-text");
        } else {
            textSpan.classList.remove("checked-text");
        }
    };

    let closeSpan = document.createElement("span");
    closeSpan.textContent = "×";
    closeSpan.className = "close";
    closeSpan.onclick = function() {
        this.parentElement.remove();
    };

    li.appendChild(checkBox);
    li.appendChild(textSpan);
    li.appendChild(closeSpan);

    document.getElementById("myUL").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
